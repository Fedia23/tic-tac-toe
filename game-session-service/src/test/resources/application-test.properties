# Test Configuration
spring.application.name=game-session-service-test

# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable H2 Console in tests
spring.h2.console.enabled=false

# Game Engine Service Configuration (Mock)
game.engine.url=http://localhost:8081

# Logging
logging.level.com.fyre.tictactoe.session=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Disable DevTools in tests
spring.devtools.restart.enabled=false